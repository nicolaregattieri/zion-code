<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 640" width="520" height="640">
  <defs>
    <linearGradient id="titlebar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3c"/>
      <stop offset="100%" stop-color="#2c2c2e"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#1a1a1c"/>
    </linearGradient>
    <linearGradient id="activeTab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(110,85,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(110,85,255,0.08)"/>
    </linearGradient>
    <linearGradient id="zionGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2d95"/>
      <stop offset="50%" stop-color="#ffb800"/>
      <stop offset="100%" stop-color="#ff2d95"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="windowClip">
      <rect x="0" y="0" width="520" height="640" rx="12"/>
    </clipPath>
  </defs>

  <!-- Window frame -->
  <g clip-path="url(#windowClip)">
    <!-- Background -->
    <rect width="520" height="640" fill="url(#bg)" rx="12"/>

    <!-- Title bar -->
    <rect width="520" height="36" fill="url(#titlebar)"/>
    <!-- Traffic lights -->
    <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="18" r="6" fill="#28c940"/>
    <!-- Title -->
    <text x="260" y="23" fill="#e5e5e7" font-family="-apple-system,SF Pro,Helvetica" font-size="13" text-anchor="middle" font-weight="500">Settings</text>

    <!-- Tab bar area -->
    <rect y="36" width="520" height="62" fill="#2c2c2e"/>

    <!-- Tab: General (active) -->
    <rect x="12" y="42" width="96" height="50" rx="8" fill="url(#activeTab)"/>
    <text x="60" y="62" fill="#6e55ff" font-family="-apple-system,SF Pro,Helvetica" font-size="20" text-anchor="middle">⚙</text>
    <text x="60" y="82" fill="#6e55ff" font-family="-apple-system,SF Pro,Helvetica" font-size="10" text-anchor="middle" font-weight="500">General</text>

    <!-- Tab: Editor -->
    <text x="160" y="62" fill="#8e8e93" font-family="-apple-system,SF Pro,Helvetica" font-size="20" text-anchor="middle">✏</text>
    <text x="160" y="82" fill="#8e8e93" font-family="-apple-system,SF Pro,Helvetica" font-size="10" text-anchor="middle">Editor</text>

    <!-- Tab: Terminal -->
    <text x="260" y="62" fill="#8e8e93" font-family="-apple-system,SF Pro,Helvetica" font-size="20" text-anchor="middle">⬛</text>
    <text x="260" y="82" fill="#8e8e93" font-family="-apple-system,SF Pro,Helvetica" font-size="10" text-anchor="middle">Terminal</text>

    <!-- Tab: AI -->
    <text x="360" y="62" fill="#8e8e93" font-family="-apple-system,SF Pro,Helvetica" font-size="20" text-anchor="middle">✨</text>
    <text x="360" y="82" fill="#8e8e93" font-family="-apple-system,SF Pro,Helvetica" font-size="10" text-anchor="middle">AI</text>

    <!-- Tab: Notifications -->
    <text x="460" y="62" fill="#8e8e93" font-family="-apple-system,SF Pro,Helvetica" font-size="20" text-anchor="middle">🔔</text>
    <text x="460" y="82" fill="#8e8e93" font-family="-apple-system,SF Pro,Helvetica" font-size="10" text-anchor="middle">Notifications</text>

    <!-- Divider -->
    <line x1="0" y1="98" x2="520" y2="98" stroke="#3a3a3c" stroke-width="0.5"/>

    <!-- ======================== -->
    <!-- GENERAL TAB CONTENT      -->
    <!-- ======================== -->

    <!-- Zion Mode Section -->
    <text x="24" y="132" fill="#6e55ff" font-family="-apple-system,SF Pro,Helvetica" font-size="11" font-weight="600" letter-spacing="1">ZION MODE</text>

    <!-- Zion Mode toggle card -->
    <rect x="20" y="142" width="480" height="56" rx="10" fill="#2c2c2e" stroke="#3a3a3c" stroke-width="0.5"/>
    <!-- Glow border -->
    <rect x="20" y="142" width="480" height="56" rx="10" fill="none" stroke="url(#zionGlow)" stroke-width="1.5" opacity="0.5" filter="url(#glow)"/>
    <!-- Icon -->
    <text x="44" y="176" fill="#ff2d95" font-family="-apple-system,SF Pro,Helvetica" font-size="22">⚡</text>
    <!-- Label -->
    <text x="72" y="166" fill="#e5e5e7" font-family="-apple-system,SF Pro,Helvetica" font-size="13" font-weight="500">Zion Mode</text>
    <text x="72" y="184" fill="#8e8e93" font-family="-apple-system,SF Pro,Helvetica" font-size="11">Unlock the full power of Zion</text>
    <!-- Toggle ON -->
    <rect x="446" y="160" width="40" height="24" rx="12" fill="#6e55ff"/>
    <circle cx="474" cy="172" r="10" fill="white"/>

    <!-- Interface Section -->
    <text x="24" y="228" fill="#6e55ff" font-family="-apple-system,SF Pro,Helvetica" font-size="11" font-weight="600" letter-spacing="1">INTERFACE</text>

    <!-- Interface card -->
    <rect x="20" y="238" width="480" height="120" rx="10" fill="#2c2c2e" stroke="#3a3a3c" stroke-width="0.5"/>

    <!-- Language row -->
    <text x="40" y="272" fill="#e5e5e7" font-family="-apple-system,SF Pro,Helvetica" font-size="13">Language</text>
    <!-- Picker -->
    <rect x="360" y="256" width="126" height="28" rx="6" fill="#3a3a3c"/>
    <text x="378" y="275" fill="#e5e5e7" font-family="-apple-system,SF Pro,Helvetica" font-size="12">English</text>
    <text x="470" y="274" fill="#8e8e93" font-family="-apple-system,SF Pro,Helvetica" font-size="10">▼</text>

    <!-- Divider inside card -->
    <line x1="40" y1="296" x2="480" y2="296" stroke="#3a3a3c" stroke-width="0.5"/>

    <!-- Appearance row -->
    <text x="40" y="326" fill="#e5e5e7" font-family="-apple-system,SF Pro,Helvetica" font-size="13">Appearance</text>
    <!-- Segmented picker -->
    <rect x="310" y="310" width="176" height="28" rx="6" fill="#3a3a3c"/>
    <!-- System option (active) -->
    <rect x="312" y="312" width="58" height="24" rx="5" fill="#6e55ff"/>
    <text x="341" y="329" fill="white" font-family="-apple-system,SF Pro,Helvetica" font-size="11" text-anchor="middle" font-weight="500">System</text>
    <!-- Light option -->
    <text x="399" y="329" fill="#8e8e93" font-family="-apple-system,SF Pro,Helvetica" font-size="11" text-anchor="middle">Light</text>
    <!-- Dark option -->
    <text x="457" y="329" fill="#8e8e93" font-family="-apple-system,SF Pro,Helvetica" font-size="11" text-anchor="middle">Dark</text>

    <!-- Divider inside card -->
    <line x1="40" y1="348" x2="480" y2="348" stroke="#3a3a3c" stroke-width="0.5"/>

    <!-- Safety Section -->
    <text x="24" y="392" fill="#6e55ff" font-family="-apple-system,SF Pro,Helvetica" font-size="11" font-weight="600" letter-spacing="1">SAFETY</text>

    <!-- Safety card -->
    <rect x="20" y="402" width="480" height="60" rx="10" fill="#2c2c2e" stroke="#3a3a3c" stroke-width="0.5"/>

    <!-- Confirmation mode -->
    <text x="40" y="438" fill="#e5e5e7" font-family="-apple-system,SF Pro,Helvetica" font-size="13">Confirmation mode</text>
    <!-- Picker -->
    <rect x="340" y="420" width="146" height="28" rx="6" fill="#3a3a3c"/>
    <text x="358" y="439" fill="#e5e5e7" font-family="-apple-system,SF Pro,Helvetica" font-size="12">Destructive only</text>
    <text x="470" y="438" fill="#8e8e93" font-family="-apple-system,SF Pro,Helvetica" font-size="10">▼</text>

    <!-- Version info at bottom -->
    <text x="260" y="560" fill="#48484a" font-family="-apple-system,SF Pro,Helvetica" font-size="11" text-anchor="middle">Zion v1.0.0</text>
    <text x="260" y="578" fill="#48484a" font-family="-apple-system,SF Pro,Helvetica" font-size="10" text-anchor="middle">Built with ❤ in Brazil</text>

    <!-- Window border -->
    <rect width="520" height="640" rx="12" fill="none" stroke="#48484a" stroke-width="0.5"/>
  </g>
</svg>
