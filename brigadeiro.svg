<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Chocolate gradient for the brigadeiro body -->
    <radialGradient id="chocoBody" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#6b3a2a"/>
      <stop offset="40%" stop-color="#4a2518"/>
      <stop offset="85%" stop-color="#3a1a10"/>
      <stop offset="100%" stop-color="#2e1208"/>
    </radialGradient>
    <!-- Shine highlight -->
    <radialGradient id="shine" cx="38%" cy="30%" r="30%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Paper cup gradient -->
    <linearGradient id="cupOuter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="cupInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <!-- Table surface -->
    <linearGradient id="table" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5e6d3"/>
      <stop offset="100%" stop-color="#e8d5bf"/>
    </linearGradient>
    <!-- Shadow -->
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.25)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <!-- Sprinkle colors -->
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000044"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#table)" rx="0"/>

  <!-- Subtle tablecloth pattern -->
  <rect width="400" height="400" fill="url(#table)" opacity="0.6"/>
  <line x1="0" y1="395" x2="400" y2="395" stroke="#d4c4ae" stroke-width="1"/>

  <!-- Shadow on table -->
  <ellipse cx="200" cy="310" rx="110" ry="22" fill="url(#shadow)"/>

  <!-- === PAPER CUP (forminha) === -->
  <!-- Outer cup shape - fluted/corrugated paper -->
  <path d="M 110 280 Q 108 260 120 240 L 130 220 Q 135 210 140 205
           L 145 200 Q 150 195 155 193 L 200 190 L 245 193
           Q 250 195 255 200 L 260 205 Q 265 210 270 220
           L 280 240 Q 292 260 290 280 Z"
        fill="url(#cupOuter)" filter="url(#softShadow)"/>

  <!-- Cup ridges (corrugated texture) -->
  <path d="M 115 275 Q 113 258 124 238" stroke="#333" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 125 278 Q 123 255 132 232" stroke="#333" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 135 280 Q 133 252 140 226" stroke="#333" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 148 281 Q 147 250 150 220" stroke="#333" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 162 282 Q 161 248 160 215" stroke="#333" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 176 282 Q 176 248 174 210" stroke="#333" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 190 282 Q 190 247 188 205" stroke="#333" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 204 282 Q 204 247 205 205" stroke="#333" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 218 282 Q 218 248 220 210" stroke="#333" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 232 282 Q 233 248 236 215" stroke="#333" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 246 281 Q 247 250 250 220" stroke="#333" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 258 280 Q 260 252 262 228" stroke="#333" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 270 278 Q 272 256 272 236" stroke="#333" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 280 275 Q 284 258 280 242" stroke="#333" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- Cup inner rim -->
  <ellipse cx="200" cy="195" rx="58" ry="10" fill="url(#cupInner)" stroke="#3a3a3a" stroke-width="0.5"/>

  <!-- === BRIGADEIRO BALL === -->
  <!-- Main chocolate sphere -->
  <circle cx="200" cy="170" r="62" fill="url(#chocoBody)" filter="url(#softShadow)"/>
  <!-- Chocolate surface texture - subtle bumps -->
  <circle cx="200" cy="170" r="62" fill="url(#shine)" opacity="0.8"/>

  <!-- Subtle bottom shadow on ball -->
  <ellipse cx="200" cy="205" rx="45" ry="8" fill="rgba(0,0,0,0.3)"/>

  <!-- === CHOCOLATE SPRINKLES (granulado) === -->
  <!-- Sprinkles are small elongated shapes scattered on the sphere -->
  
  <!-- Top area sprinkles -->
  <rect x="180" y="118" width="8" height="3" rx="1.5" fill="#2e1208" transform="rotate(-20 184 119)"/>
  <rect x="195" y="112" width="7" height="3" rx="1.5" fill="#4a2010" transform="rotate(35 198 113)"/>
  <rect x="212" y="115" width="8" height="3" rx="1.5" fill="#3a1808" transform="rotate(-45 216 116)"/>
  <rect x="170" y="125" width="7" height="3" rx="1.5" fill="#2e1208" transform="rotate(15 173 126)"/>
  <rect x="225" y="120" width="7" height="3" rx="1.5" fill="#4a2518" transform="rotate(60 228 121)"/>
  <rect x="205" y="108" width="6" height="2.5" rx="1.2" fill="#3a1a10" transform="rotate(-10 208 109)"/>

  <!-- Upper-middle sprinkles -->
  <rect x="152" y="140" width="8" height="3" rx="1.5" fill="#3a1808" transform="rotate(40 156 141)"/>
  <rect x="165" y="135" width="7" height="3" rx="1.5" fill="#2e1208" transform="rotate(-30 168 136)"/>
  <rect x="185" y="132" width="8" height="3" rx="1.5" fill="#4a2010" transform="rotate(55 189 133)"/>
  <rect x="200" y="128" width="7" height="3" rx="1.5" fill="#3a1a10" transform="rotate(-15 203 129)"/>
  <rect x="218" y="130" width="8" height="3" rx="1.5" fill="#2e1208" transform="rotate(25 222 131)"/>
  <rect x="235" y="135" width="7" height="3" rx="1.5" fill="#4a2518" transform="rotate(-50 238 136)"/>
  <rect x="245" y="142" width="7" height="3" rx="1.5" fill="#3a1808" transform="rotate(10 248 143)"/>
  <rect x="148" y="152" width="7" height="3" rx="1.5" fill="#4a2010" transform="rotate(-25 151 153)"/>

  <!-- Middle sprinkles -->
  <rect x="142" y="165" width="8" height="3" rx="1.5" fill="#2e1208" transform="rotate(70 146 166)"/>
  <rect x="155" y="158" width="7" height="3" rx="1.5" fill="#4a2518" transform="rotate(-40 158 159)"/>
  <rect x="170" y="155" width="8" height="3" rx="1.5" fill="#3a1a10" transform="rotate(20 174 156)"/>
  <rect x="188" y="150" width="7" height="3" rx="1.5" fill="#2e1208" transform="rotate(-60 191 151)"/>
  <rect x="208" y="148" width="8" height="3" rx="1.5" fill="#4a2010" transform="rotate(45 212 149)"/>
  <rect x="222" y="152" width="7" height="3" rx="1.5" fill="#3a1808" transform="rotate(-10 225 153)"/>
  <rect x="238" y="155" width="8" height="3" rx="1.5" fill="#2e1208" transform="rotate(30 242 156)"/>
  <rect x="250" y="162" width="7" height="3" rx="1.5" fill="#4a2518" transform="rotate(-55 253 163)"/>
  <rect x="256" y="172" width="7" height="3" rx="1.5" fill="#3a1a10" transform="rotate(15 259 173)"/>

  <!-- Lower-middle sprinkles -->
  <rect x="145" y="180" width="7" height="3" rx="1.5" fill="#4a2010" transform="rotate(-35 148 181)"/>
  <rect x="158" y="175" width="8" height="3" rx="1.5" fill="#2e1208" transform="rotate(50 162 176)"/>
  <rect x="175" y="172" width="7" height="3" rx="1.5" fill="#3a1808" transform="rotate(-20 178 173)"/>
  <rect x="192" y="168" width="8" height="3" rx="1.5" fill="#4a2518" transform="rotate(65 196 169)"/>
  <rect x="210" y="165" width="7" height="3" rx="1.5" fill="#2e1208" transform="rotate(-45 213 166)"/>
  <rect x="226" y="170" width="8" height="3" rx="1.5" fill="#3a1a10" transform="rotate(5 230 171)"/>
  <rect x="240" y="175" width="7" height="3" rx="1.5" fill="#4a2010" transform="rotate(-70 243 176)"/>
  <rect x="252" y="182" width="7" height="3" rx="1.5" fill="#2e1208" transform="rotate(40 255 183)"/>

  <!-- Bottom area sprinkles -->
  <rect x="155" y="192" width="7" height="3" rx="1.5" fill="#3a1a10" transform="rotate(25 158 193)"/>
  <rect x="172" y="190" width="8" height="3" rx="1.5" fill="#4a2518" transform="rotate(-15 176 191)"/>
  <rect x="190" y="186" width="7" height="3" rx="1.5" fill="#2e1208" transform="rotate(55 193 187)"/>
  <rect x="208" y="184" width="8" height="3" rx="1.5" fill="#3a1808" transform="rotate(-40 212 185)"/>
  <rect x="225" y="188" width="7" height="3" rx="1.5" fill="#4a2010" transform="rotate(10 228 189)"/>
  <rect x="240" y="192" width="7" height="3" rx="1.5" fill="#2e1208" transform="rotate(-60 243 193)"/>

  <!-- Extra shine highlights on sprinkles -->
  <rect x="195" y="112" width="7" height="1" rx="0.5" fill="rgba(255,255,255,0.15)" transform="rotate(35 198 112)"/>
  <rect x="218" y="130" width="8" height="1" rx="0.5" fill="rgba(255,255,255,0.12)" transform="rotate(25 222 130)"/>
  <rect x="192" y="168" width="8" height="1" rx="0.5" fill="rgba(255,255,255,0.12)" transform="rotate(65 196 168)"/>

  <!-- Top glossy highlight -->
  <ellipse cx="185" cy="140" rx="28" ry="18" fill="rgba(255,255,255,0.06)" transform="rotate(-15 185 140)"/>

  <!-- Label text -->
  <text x="200" y="365" fill="#8b7355" font-family="Georgia, serif" font-size="22" text-anchor="middle" font-style="italic" font-weight="600">Brigadeiro</text>
  <text x="200" y="385" fill="#a89478" font-family="Georgia, serif" font-size="12" text-anchor="middle" font-style="italic">doce brasileiro 🇧🇷</text>
</svg>
