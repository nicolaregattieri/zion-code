<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450" width="400" height="450">
  <!-- Background -->
  <rect width="400" height="450" rx="20" fill="#f0e6d3"/>

  <!-- Ground shadow -->
  <ellipse cx="200" cy="420" rx="130" ry="15" fill="#d4c4a8" opacity="0.6"/>

  <!-- Gradients -->
  <defs>
    <radialGradient id="bodyGrad" cx="0.4" cy="0.3">
      <stop offset="0%" stop-color="#A0522D"/>
      <stop offset="100%" stop-color="#6B3410"/>
    </radialGradient>
    <radialGradient id="headGrad" cx="0.4" cy="0.3">
      <stop offset="0%" stop-color="#A0522D"/>
      <stop offset="100%" stop-color="#7B4513"/>
    </radialGradient>
    <linearGradient id="earGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5C2D0E"/>
      <stop offset="100%" stop-color="#3E1A06"/>
    </linearGradient>
  </defs>

  <!-- Back legs (behind body) -->
  <rect x="148" y="330" width="16" height="65" rx="7" fill="#5C2D0E"/>
  <rect x="236" y="330" width="16" height="65" rx="7" fill="#5C2D0E"/>
  <ellipse cx="156" cy="397" rx="12" ry="6" fill="#1A1A1A"/>
  <ellipse cx="244" cy="397" rx="12" ry="6" fill="#1A1A1A"/>

  <!-- Tail (short docked stub - classic MinPin) -->
  <path d="M268 285 Q290 265 286 245" stroke="#6B3410" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- Body -->
  <ellipse cx="200" cy="305" rx="75" ry="55" fill="url(#bodyGrad)"/>

  <!-- Chest tan marking -->
  <ellipse cx="200" cy="320" rx="32" ry="35" fill="#D2691E"/>

  <!-- Front legs -->
  <rect x="165" y="335" width="20" height="65" rx="8" fill="#8B4513"/>
  <rect x="215" y="335" width="20" height="65" rx="8" fill="#8B4513"/>
  <!-- Tan markings on front legs -->
  <rect x="165" y="365" width="20" height="25" rx="6" fill="#D2691E" opacity="0.8"/>
  <rect x="215" y="365" width="20" height="25" rx="6" fill="#D2691E" opacity="0.8"/>
  <!-- Paws -->
  <ellipse cx="175" cy="402" rx="13" ry="7" fill="#1A1A1A"/>
  <ellipse cx="225" cy="402" rx="13" ry="7" fill="#1A1A1A"/>

  <!-- Neck -->
  <path d="M175 270 Q200 255 225 270 L222 290 Q200 280 178 290 Z" fill="#8B4513"/>

  <!-- Head -->
  <ellipse cx="200" cy="210" rx="55" ry="55" fill="url(#headGrad)"/>

  <!-- Tan eyebrow markings -->
  <ellipse cx="180" cy="195" rx="11" ry="7" fill="#D2691E"/>
  <ellipse cx="220" cy="195" rx="11" ry="7" fill="#D2691E"/>

  <!-- Tan muzzle marking -->
  <ellipse cx="200" cy="235" rx="24" ry="18" fill="#D2691E"/>

  <!-- Snout -->
  <ellipse cx="200" cy="238" rx="18" ry="14" fill="#C4824A"/>

  <!-- Nose -->
  <ellipse cx="200" cy="230" rx="9" ry="7" fill="#1A1A1A"/>
  <ellipse cx="198" cy="228" rx="2.5" ry="2" fill="#444" opacity="0.5"/>

  <!-- Eyes -->
  <ellipse cx="182" cy="205" rx="10" ry="11" fill="white"/>
  <ellipse cx="218" cy="205" rx="10" ry="11" fill="white"/>
  <circle cx="184" cy="204" r="7" fill="#2C1810"/>
  <circle cx="220" cy="204" r="7" fill="#2C1810"/>
  <circle cx="186" cy="202" r="2.5" fill="white"/>
  <circle cx="222" cy="202" r="2.5" fill="white"/>

  <!-- Eyebrows -->
  <path d="M170 192 Q180 185 192 192" stroke="#3E1A06" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M208 192 Q220 185 230 192" stroke="#3E1A06" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Ears (tall, pointy, erect - classic Pinscher) -->
  <path d="M157 195 L138 115 L178 175 Z" fill="url(#earGrad)"/>
  <path d="M160 188 L146 130 L174 172 Z" fill="#8B4513" opacity="0.4"/>
  <path d="M243 195 L262 115 L222 175 Z" fill="url(#earGrad)"/>
  <path d="M240 188 L254 130 L226 172 Z" fill="#8B4513" opacity="0.4"/>

  <!-- Mouth -->
  <path d="M192 244 Q200 252 208 244" stroke="#3E1A06" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <line x1="200" y1="240" x2="200" y2="246" stroke="#3E1A06" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Whisker dots -->
  <circle cx="186" cy="238" r="1.5" fill="#3E1A06"/>
  <circle cx="182" cy="242" r="1.5" fill="#3E1A06"/>
  <circle cx="214" cy="238" r="1.5" fill="#3E1A06"/>
  <circle cx="218" cy="242" r="1.5" fill="#3E1A06"/>

  <!-- Collar -->
  <path d="M172 268 Q200 278 228 268" fill="none" stroke="#CC0000" stroke-width="6" stroke-linecap="round"/>
  <!-- Collar tag -->
  <circle cx="200" cy="280" r="5" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
</svg>