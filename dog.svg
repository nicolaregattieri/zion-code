<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" rx="20" fill="#FFF8E7"/>

  <!-- Body -->
  <ellipse cx="200" cy="290" rx="90" ry="70" fill="#D4873F"/>

  <!-- Belly patch -->
  <ellipse cx="200" cy="310" rx="55" ry="45" fill="#F5DEB3"/>

  <!-- Back legs -->
  <ellipse cx="145" cy="340" rx="25" ry="35" fill="#C47A35"/>
  <ellipse cx="255" cy="340" rx="25" ry="35" fill="#C47A35"/>

  <!-- Back paws -->
  <ellipse cx="145" cy="365" rx="22" ry="12" fill="#D4873F"/>
  <ellipse cx="255" cy="365" rx="22" ry="12" fill="#D4873F"/>

  <!-- Front legs -->
  <rect x="160" y="310" width="28" height="55" rx="14" fill="#D4873F"/>
  <rect x="212" y="310" width="28" height="55" rx="14" fill="#D4873F"/>

  <!-- Front paws -->
  <ellipse cx="174" cy="365" rx="18" ry="12" fill="#C47A35"/>
  <ellipse cx="226" cy="365" rx="18" ry="12" fill="#C47A35"/>

  <!-- Paw toes -->
  <circle cx="164" cy="363" r="4" fill="#A0612B"/>
  <circle cx="174" cy="361" r="4" fill="#A0612B"/>
  <circle cx="184" cy="363" r="4" fill="#A0612B"/>
  <circle cx="216" cy="363" r="4" fill="#A0612B"/>
  <circle cx="226" cy="361" r="4" fill="#A0612B"/>
  <circle cx="236" cy="363" r="4" fill="#A0612B"/>

  <!-- Tail -->
  <path d="M290 270 Q330 230 310 190 Q305 180 315 185 Q340 200 335 240 Q330 270 295 280" fill="#D4873F" stroke="#C47A35" stroke-width="2"/>

  <!-- Head -->
  <circle cx="200" cy="175" r="85" fill="#D4873F"/>

  <!-- Ears -->
  <ellipse cx="125" cy="120" rx="35" ry="55" transform="rotate(-15 125 120)" fill="#C47A35"/>
  <ellipse cx="125" cy="125" rx="22" ry="38" transform="rotate(-15 125 125)" fill="#E8A862"/>
  <ellipse cx="275" cy="120" rx="35" ry="55" transform="rotate(15 275 120)" fill="#C47A35"/>
  <ellipse cx="275" cy="125" rx="22" ry="38" transform="rotate(15 275 125)" fill="#E8A862"/>

  <!-- Face patch -->
  <ellipse cx="200" cy="195" rx="60" ry="50" fill="#F5DEB3"/>

  <!-- Eyes -->
  <ellipse cx="170" cy="165" rx="18" ry="20" fill="white"/>
  <ellipse cx="230" cy="165" rx="18" ry="20" fill="white"/>
  <circle cx="175" cy="168" r="11" fill="#3D2B1F"/>
  <circle cx="235" cy="168" r="11" fill="#3D2B1F"/>
  <!-- Eye shine -->
  <circle cx="179" cy="162" r="4" fill="white"/>
  <circle cx="239" cy="162" r="4" fill="white"/>
  <circle cx="173" cy="172" r="2" fill="white"/>
  <circle cx="233" cy="172" r="2" fill="white"/>

  <!-- Eyebrows -->
  <path d="M155 148 Q167 140 185 145" stroke="#3D2B1F" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M215 145 Q233 140 245 148" stroke="#3D2B1F" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="200" cy="195" rx="16" ry="12" fill="#3D2B1F"/>
  <ellipse cx="200" cy="192" rx="6" ry="4" fill="#6B4E3D" opacity="0.5"/>

  <!-- Mouth -->
  <path d="M200 207 Q185 222 175 215" stroke="#3D2B1F" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M200 207 Q215 222 225 215" stroke="#3D2B1F" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Tongue -->
  <ellipse cx="210" cy="220" rx="10" ry="14" fill="#FF7B7B"/>
  <line x1="210" y1="210" x2="210" y2="232" stroke="#E65C5C" stroke-width="1.5"/>

  <!-- Cheek blush -->
  <ellipse cx="145" cy="195" rx="15" ry="10" fill="#FFB6C1" opacity="0.5"/>
  <ellipse cx="255" cy="195" rx="15" ry="10" fill="#FFB6C1" opacity="0.5"/>

  <!-- Collar -->
  <path d="M140 245 Q200 270 260 245" stroke="#E74C3C" stroke-width="10" fill="none" stroke-linecap="round"/>
  <circle cx="200" cy="262" r="10" fill="#F1C40F" stroke="#E6A817" stroke-width="2"/>
  <circle cx="200" cy="262" r="4" fill="#E6A817"/>

  <!-- Ground shadow -->
  <ellipse cx="200" cy="385" rx="120" ry="10" fill="rgba(0,0,0,0.07)"/>
</svg>